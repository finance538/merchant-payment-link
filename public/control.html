<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>لوحة التاجر</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="control-shell">
      <section class="control-panel">
        <header class="control-header">
          <div>
            <p class="small-kicker">Merchant Payment Link</p>
            <h1 id="controlTitle">لوحة التاجر</h1>
          </div>
          <div class="control-header-actions">
            <button id="languageToggle" class="secondary-button" type="button">English</button>
            <a id="newPaymentLink" class="secondary-button" href="/merchant.html">رابط جديد</a>
          </div>
        </header>

        <form id="authForm" class="control-auth">
          <label id="tokenLabel" for="tokenInput">رمز اللوحة</label>
          <div class="token-row">
            <input id="tokenInput" type="password" autocomplete="current-password" />
            <button id="loginButton" class="pay-button compact-button" type="submit">دخول</button>
          </div>
        </form>

        <div id="controlApp" class="control-app" hidden>
          <div class="control-toolbar">
            <strong id="panelStatus">متصل</strong>
            <button id="refreshButton" class="secondary-button" type="button">تحديث</button>
          </div>
          <div id="reviewsList" class="reviews-list"></div>
        </div>
      </section>
    </main>
    <script type="module" src="/control.js"></script>
  </body>
</html>
