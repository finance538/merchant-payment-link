<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Merchant control</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="control-shell">
      <section class="control-panel">
        <header class="control-header">
          <div>
            <p class="small-kicker">Merchant Payment Link</p>
            <h1 id="controlTitle">Merchant control</h1>
          </div>
          <div class="control-header-actions">
            <a id="newPaymentLink" class="secondary-button" href="/merchant.html">New payment</a>
          </div>
        </header>

        <form id="authForm" class="control-auth">
          <label id="tokenLabel" for="tokenInput">Panel token</label>
          <div class="token-row">
            <input id="tokenInput" type="password" autocomplete="current-password" />
            <button id="loginButton" class="pay-button compact-button" type="submit">Login</button>
          </div>
        </form>

        <div id="controlApp" class="control-app" hidden>
          <div class="control-toolbar">
            <strong id="panelStatus">Connected</strong>
            <button id="telegramTestButton" class="secondary-button" type="button">Test Telegram</button>
            <button id="tamaraWebhookButton" class="secondary-button" type="button">Register Tamara</button>
            <button id="refreshButton" class="secondary-button" type="button">Refresh</button>
          </div>
          <div id="reviewsList" class="reviews-list"></div>
        </div>
      </section>
    </main>
    <script type="module" src="/control.js"></script>
  </body>
</html>
