<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Direct Payment</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="merchant-shell">
      <section class="merchant-card">
        <div class="brand-line">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Merchant Payment Link</span>
        </div>

        <p class="small-kicker" id="merchantKicker"></p>
        <h1 id="merchantTitle"></h1>
        <p id="merchantBody" class="muted"></p>

        <form id="paymentForm" class="merchant-form">
          <label for="amount" id="amountInputLabel"></label>
          <div class="amount-entry">
            <input id="amount" name="amount" inputmode="decimal" autocomplete="off" placeholder="100.00" required />
            <span>SAR</span>
          </div>

          <fieldset class="gateway-picker" aria-labelledby="gatewayLabel">
            <legend id="gatewayLabel"></legend>
            <label class="gateway-option">
              <input type="radio" name="gateway" value="paytabs" checked />
              <span>
                <strong>PayTabs</strong>
                <small>Cards and Apple Pay</small>
              </span>
            </label>
            <label class="gateway-option">
              <input type="radio" name="gateway" value="tamara" />
              <span>
                <strong>Tamara</strong>
                <small>Pay with Tamara</small>
              </span>
            </label>
            <label class="gateway-option">
              <input type="radio" name="gateway" value="tap" />
              <span>
                <strong>Tap</strong>
                <small>Cards and local methods</small>
              </span>
            </label>
          </fieldset>

          <button class="pay-button" type="submit" id="payButton"></button>
        </form>

        <p id="merchantStatus" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="/merchant.js"></script>
  </body>
</html>
