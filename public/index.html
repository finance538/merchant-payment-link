<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Direct payment link" />
    <title>Direct Payment</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="page-shell pay-page">
      <section class="pay-card" aria-labelledby="amountLabel">
        <div class="brand-line">
          <span class="brand-mark" aria-hidden="true"></span>
          <span>Merchant Payment Link</span>
        </div>

        <div class="amount-box">
          <span id="amountLabel"></span>
          <strong id="amountValue"></strong>
        </div>

        <fieldset class="gateway-picker compact-gateway-picker" aria-labelledby="gatewayLabel">
          <legend id="gatewayLabel">Payment gateway</legend>
          <label class="gateway-option">
            <input type="radio" name="gateway" value="paytabs" checked />
            <span>
              <strong>PayTabs</strong>
              <small>Cards and Apple Pay</small>
            </span>
          </label>
          <label class="gateway-option">
            <input type="radio" name="gateway" value="tamara" />
            <span>
              <strong>Tamara</strong>
              <small>Pay with Tamara</small>
            </span>
          </label>
        </fieldset>

        <button id="payButton" class="pay-button" type="button">
          <span id="payButtonText">Pay Now</span>
        </button>

        <p id="status" class="status" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="/app.js"></script>
  </body>
</html>
